apiVersion: apps/v1
kind: Deployment
metadata:
  name: miygardenwebapi-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: miygardenwebapi
  template:
    metadata:
      labels:
        verison: v1.0.0
        app: miygardenwebapi
    spec:
      containers:
      - name: miygardenwebapi
        image: miygardenwebapi:v1
        imagePullPolicy: Never
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
        ports:
        - containerPort: 80